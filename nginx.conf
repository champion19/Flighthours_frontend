server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web SPA — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets estáticos (JS, CSS, imágenes, fuentes)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deshabilitar logs de /favicon.ico y /robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Seguridad básica — bloquear archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
