server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Flutter Web SPA — todas las rutas redirigen a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Archivos de entrada/versionado de Flutter web: sin nombre con hash,
    # deben revalidarse en cada carga para que un nuevo deploy se vea al instante.
    location ~* ^/(index\.html|main\.dart\.js|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|version\.json)$ {
        add_header Cache-Control "no-cache";
    }

    # Cache largo para el resto de assets estáticos (JS restante, CSS, imágenes, fuentes)
    # Nginx evalúa las locations con regex en el orden en que aparecen y se
    # detiene en la primera coincidencia, por eso este bloque va después del
    # anterior: los archivos de entrada de Flutter ya quedaron capturados ahí.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Deshabilitar logs de /favicon.ico y /robots.txt
    location = /favicon.ico {
        log_not_found off;
        access_log off;
    }

    # Seguridad básica — bloquear archivos ocultos
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
